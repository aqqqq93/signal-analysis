seed: 20260710
device: auto
run_dir: stage2_iccd/runs/simple_multicomponent_robust

data:
  fs: 1024.0
  n_samples: 1024
  num_components: 2
  freq_min: 35.0
  freq_max: 430.0
  snr_db_min: -2.0
  snr_db_max: 24.0
  scenario_weights:
    linear: 1.0
    quadratic: 1.0
    cubic: 1.0
    sinusoidal_fm: 0.0
    crossing: 0.0
    near_parallel: 0.0
    local_jump: 0.0
    tangent_or_overlap: 0.0
  noise_types:
    white: 0.55
    colored: 0.25
    impulsive: 0.10
    trend: 0.10

init:
  mode: frozen_ifnet_checkpoint
  num_candidates: 2
  smooth_kernel: 31
  checkpoint: ifnet_stage1/runs/balanced_refit_resume/latest.pt

iccd:
  amplitude_order: 8
  period_factor: 2.0
  alpha_init: 1.0
  alpha_min: 0.00001
  solve_jitter: 0.000001

model:
  num_candidates: 2
  refine_channels: 32
  refine_layers: 3
  max_refine_hz: 24.0
  candidate_temperature: 0.02
  candidate_temperature_min: 0.001

train:
  resume: stage2_iccd/runs/simple_multicomponent_long/latest.pt
  steps: 600
  batch_size: 8
  lr: 0.0001
  weight_decay: 0.000001
  grad_clip: 1.0
  print_every: 50
  save_every: 200
  val_batches: 6
  loss:
    reconstruction: 1.0
    component: 0.25
    if_l1: 0.08
    smooth: 0.0015
    delta: 0.0008
    candidate_entropy: 0.0005
