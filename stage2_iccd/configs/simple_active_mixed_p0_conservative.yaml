train:
  resume: stage2_iccd/runs/simple_multicomponent_long/latest.pt
  steps: 450
  batch_size: 8
  lr: 0.00004
  weight_decay: 0.000001
  grad_clip: 0.8
  print_every: 50
  save_every: 150
  val_batches: 8
  loss:
    reconstruction: 1.0
    component: 0.28
    inactive_component: 0.04
    if_l1: 0.09
    smooth: 0.004
    delta: 0.003
    candidate_entropy: 0.0005
