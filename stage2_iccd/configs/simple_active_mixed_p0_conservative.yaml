seed: 20260723
device: auto
run_dir: stage2_iccd/runs/simple_active_mixed_p0_conservative

data:
  fs: 1024.0
  n_samples: 1024
  num_components: 2
  active_components:
    1: 0.35
    2: 0.65
  freq_min: 35.0
  freq_max: 430.0
  snr_db_min: 4.0
  snr_db_max: 28.0
  scenario_weights:
    linear: 1.0
    quadratic: 1.0
    cubic: 1.0
    sinusoidal_fm: 0.0
    crossing: 0.0
    near_parallel: 0.8
    local_jump: 0.0
    tangent_or_overlap: 0.0
  noise_types:
    white: 0.75
    colored: 0.25
    impulsive: 0.0
    trend: 0.0

init:
  mode: frozen_ifnet_checkpoint
  num_candidates: 2
  smooth_kernel: 31
  checkpoint: ifnet_stage1/runs/balanced_refit_resume/latest.pt

iccd:
