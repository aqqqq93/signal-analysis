seed: 20260803
device: auto
run_dir: stage2_iccd/runs/three_component_oracle_p2

data:
  fs: 1024.0
  n_samples: 1024
  num_components: 3
  freq_min: 35.0
  freq_max: 430.0
  snr_db_min: 0.0
  snr_db_max: 24.0
  scenario_weights:
    linear: 1.0
    quadratic: 1.0
    cubic: 1.0
    sinusoidal_fm: 0.4
    crossing: 0.2
    near_parallel: 0.5
    local_jump: 0.2
    tangent_or_overlap: 0.2
  active_components:
    1: 0.20
    2: 0.45
    3: 0.35
  noise_types:
    white: 0.65
    colored: 0.25
    impulsive: 0.05
    trend: 0.05

init:
  mode: oracle_perturbed
  num_candidates: 2
  noise_hz: 9.0
  alt_noise_hz: 18.0
  smooth_kernel: 31

iccd:
  amplitude_order: 8
  period_factor: 2.0
  alpha_init: 1.0
  alpha_min: 0.00001
  solve_jitter: 0.000001

model:
  num_candidates: 2
  refine_channels: 36
  refine_layers: 3
  max_refine_hz: 24.0
  candidate_temperature: 0.02
  candidate_temperature_min: 0.001

train:
  steps: 120
  batch_size: 5
  lr: 0.00016
  weight_decay: 0.000001
  grad_clip: 0.9
  print_every: 30
  save_every: 60
  val_batches: 4
  loss:
    reconstruction: 1.0
    component: 0.25
    inactive_component: 0.16
    if_l1: 0.08
    smooth: 0.001
    third_derivative: 0.0002
    min_gap: 0.0004
    min_gap_hz: 6.0
    delta: 0.0004
    candidate_entropy: 0.0002
