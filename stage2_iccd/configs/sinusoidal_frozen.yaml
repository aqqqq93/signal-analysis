seed: 20260708
device: auto
run_dir: stage2_iccd/runs/sinusoidal_frozen

data:
  fs: 1024.0
  n_samples: 1024
  num_components: 2
  freq_min: 35.0
  freq_max: 430.0
  snr_db_min: -4.0
  snr_db_max: 22.0
  scenario_weights:
    linear: 0.0
    quadratic: 0.0
    cubic: 0.0
    sinusoidal_fm: 1.0
    crossing: 0.0
    near_parallel: 0.0
    local_jump: 0.0
    tangent_or_overlap: 0.0
  scenario_params:
    sinusoidal_fm:
      depth_hz: [18.0, 70.0]
      rate_cycles: [0.6, 2.8]
      trend_hz: [-40.0, 40.0]
      second_harmonic_prob: 0.35
      second_harmonic_depth_hz: [5.0, 24.0]
  noise_types:
    white: 0.55
    colored: 0.25
    impulsive: 0.10
    trend: 0.10

init:
  mode: frozen_ifnet_checkpoint
  num_candidates: 2
  smooth_kernel: 31
  checkpoint: ifnet_stage1/runs/sinusoidal_refit/latest.pt

iccd:
  amplitude_order: 10
  period_factor: 2.0
  alpha_init: 1.0
  alpha_min: 0.00001
  solve_jitter: 0.000001

model:
  num_candidates: 2
  refine_channels: 40
  refine_layers: 3
  max_refine_hz: 38.0
  candidate_temperature: 0.018
  candidate_temperature_min: 0.001

train:
  steps: 500
  batch_size: 6
  lr: 0.00018
  weight_decay: 0.000001
  grad_clip: 1.0
  print_every: 50
  save_every: 250
  val_batches: 4
  loss:
    reconstruction: 1.0
    component: 0.25
    if_l1: 0.10
    smooth: 0.0003
    delta: 0.0004
    candidate_entropy: 0.0005
