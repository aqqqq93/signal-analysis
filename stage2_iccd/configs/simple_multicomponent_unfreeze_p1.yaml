seed: 20260726
device: auto
run_dir: stage2_iccd/runs/simple_multicomponent_unfreeze_p1

data:
  fs: 1024.0
  n_samples: 1024
  num_components: 2
  freq_min: 35.0
  freq_max: 430.0
  snr_db_min: 4.0
  snr_db_max: 28.0
  scenario_weights:
    linear: 1.0
    quadratic: 1.0
    cubic: 1.0
    sinusoidal_fm: 0.0
    crossing: 0.0
    near_parallel: 0.4
    local_jump: 0.0
    tangent_or_overlap: 0.0
  noise_types:
    white: 0.75
    colored: 0.25
    impulsive: 0.0
    trend: 0.0

init:
  mode: frozen_ifnet_checkpoint
  num_candidates: 2
  smooth_kernel: 31
  checkpoint: ifnet_stage1/runs/balanced_refit_resume/latest.pt
  trainable: true
  unfreeze_last_decoders: 2
  unfreeze_head: true

iccd:
  amplitude_order: 8
  period_factor: 2.0
  alpha_init: 1.0
  alpha_min: 0.00001
  solve_jitter: 0.000001

model:
  num_candidates: 2
  refine_channels: 32
  refine_layers: 3
  max_refine_hz: 20.0
  candidate_temperature: 0.02
  candidate_temperature_min: 0.001

train:
  resume: stage2_iccd/runs/simple_multicomponent_long/latest.pt
  steps: 300
  batch_size: 4
  lr: 0.00004
  stage1_lr: 0.00001
  weight_decay: 0.000001
  stage1_weight_decay: 0.000001
  grad_clip: 0.8
  print_every: 50
  save_every: 150
  val_batches: 4
  loss:
    reconstruction: 1.0
    component: 0.25
    if_l1: 0.08
    smooth: 0.0018
    delta: 0.0010
    candidate_entropy: 0.0003
