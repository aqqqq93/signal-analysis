seed: 20260724
device: auto
run_dir: stage2_iccd/runs/local_jump_segmented_p1

data:
  fs: 1024.0
  n_samples: 1024
  num_components: 2
  freq_min: 35.0
  freq_max: 430.0
  snr_db_min: -4.0
  snr_db_max: 22.0
  scenario_weights:
    linear: 0.0
    quadratic: 0.0
    cubic: 0.0
    sinusoidal_fm: 0.0
    crossing: 0.0
    near_parallel: 0.0
    local_jump: 1.0
    tangent_or_overlap: 0.0
  scenario_params:
    local_jump:
      slope_hz: [-75.0, 85.0]
      jump_hz: [-150.0, 150.0]
      jump_abs_min_hz: 28.0
      center: [0.14, 0.86]
      width: [0.003, 0.042]
      bump_hz: [-55.0, 55.0]
      bump_width: [0.016, 0.080]
      component_jump_prob: 0.90
  noise_types:
    white: 0.55
    colored: 0.25
    impulsive: 0.10
    trend: 0.10

init:
  mode: frozen_ifnet_checkpoint
  num_candidates: 2
  smooth_kernel: 15
  checkpoint: ifnet_stage1/runs/local_jump_aux_v3/latest.pt

iccd:
  amplitude_order: 10
  period_factor: 2.0
  alpha_init: 1.0
  alpha_min: 0.00001
  solve_jitter: 0.000001

model:
  num_candidates: 2
  refine_channels: 40
  refine_layers: 3
  refinement_mode: segmented
  refine_extra_channels: 2
  max_refine_hz: 26.0
  max_jump_refine_hz: 70.0
  candidate_temperature: 0.018
  candidate_temperature_min: 0.001

train:
  resume: stage2_iccd/runs/local_jump_frozen/latest.pt
  steps: 650
  batch_size: 6
  lr: 0.00012
  weight_decay: 0.000001
  grad_clip: 0.9
  print_every: 50
  save_every: 250
  val_batches: 6
  refinement_extra:
    mode: jump_mask
    sigma: 0.035
  loss:
    reconstruction: 1.0
    component: 0.25
    if_l1: 0.11
    smooth: 0.00035
    delta: 0.00035
    candidate_entropy: 0.0005
